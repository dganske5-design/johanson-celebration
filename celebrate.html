<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTS — New Account!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;padding:2rem;}
.header{text-align:center;margin-bottom:2rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(1rem,4vw,1.8rem);color:rgba(255,255,255,0.2);letter-spacing:0.3em;margin-bottom:0.5rem;}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,8vw,3.5rem);color:#fff;letter-spacing:0.1em;}
.subtitle{font-size:clamp(0.8rem,2vw,1rem);color:rgba(255,255,255,0.3);letter-spacing:0.3em;text-transform:uppercase;margin-top:0.5rem;}
.divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,#cc0000,transparent);margin:1rem auto;}
.btn-grid{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:480px;}
.rep-btn{display:block;background:rgba(255,255,255,0.03);border:1px solid rgba(180,30,30,0.3);padding:1.4rem 2rem;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,5vw,2.2rem);letter-spacing:0.15em;text-align:center;position:relative;overflow:hidden;transition:all 0.2s;cursor:pointer;width:100%;}
.rep-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#cc0000;box-shadow:0 0 10px rgba(220,30,30,0.6);}
.rep-btn:hover{background:rgba(180,0,0,0.2);border-color:rgba(220,30,30,0.7);}
.rep-btn:active{transform:scale(0.98);}
.rep-btn:disabled{opacity:0.4;cursor:not-allowed;}
.status{margin-top:1.5rem;text-align:center;font-size:1rem;letter-spacing:0.15em;text-transform:uppercase;min-height:2rem;font-family:'Rajdhani',sans-serif;font-weight:700;}
.status.sending{color:rgba(255,255,255,0.4);}
.status.success{color:#cc0000;}
.status.error{color:#ff6666;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Johanson Transportation Service</div>
  <div class="title">🏆 New Account!</div>
  <div class="subtitle">Tap your name to alert the team</div>
  <div class="divider"></div>
</div>

<div class="btn-grid">
  <button class="rep-btn" onclick="celebrate('Colton Hafey', this)">Colton Hafey</button>
  <button class="rep-btn" onclick="celebrate('Chad Proctor', this)">Chad Proctor</button>
  <button class="rep-btn" onclick="celebrate('Grayson Grimes', this)">Grayson Grimes</button>
  <button class="rep-btn" onclick="celebrate('Marcie Andrade', this)">Marcie Andrade</button>
  <button class="rep-btn" onclick="celebrate('Drew Ganske', this)">Drew Ganske</button>
</div>

<div class="status" id="status"></div>

<script>
async function celebrate(name, btn) {
  const status = document.getElementById('status');
  const btns = document.querySelectorAll('.rep-btn');
  btns.forEach(b => b.disabled = true);
  status.textContent = 'Sending...';
  status.className = 'status sending';

  try {
    const res = await fetch('https://hooks.zapier.com/hooks/catch/25673906/4b5ggyc/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rep: name })
    });

    if (res.ok) {
      status.textContent = '🎉 Team notified for ' + name + '!';
      status.className = 'status success';
    } else {
      throw new Error('Failed');
    }
  } catch(e) {
    status.textContent = 'Error — try again';
    status.className = 'status error';
    btns.forEach(b => b.disabled = false);
    return;
  }

  setTimeout(() => {
    btns.forEach(b => b.disabled = false);
    status.textContent = '';
    status.className = 'status';
  }, 5000);
}
</script>
</body>
</html>
