<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTS Celebration Links</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;padding:2rem;}
.header{text-align:center;margin-bottom:2.5rem;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,5vw,2.5rem);color:rgba(255,255,255,0.2);letter-spacing:0.3em;margin-bottom:0.5rem;}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,8vw,4rem);color:#fff;letter-spacing:0.1em;}
.subtitle{font-size:clamp(0.8rem,2vw,1rem);color:rgba(255,255,255,0.3);letter-spacing:0.3em;text-transform:uppercase;margin-top:0.5rem;}
.divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,#cc0000,transparent);margin:1rem auto;}
.btn-grid{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:480px;}
.rep-btn{
  display:block;
  text-decoration:none;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(180,30,30,0.3);
  padding:1.2rem 2rem;
  color:#fff;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.3rem,4vw,1.8rem);
  letter-spacing:0.15em;
  text-align:center;
  position:relative;
  overflow:hidden;
  transition:all 0.2s;
}
.rep-btn::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:#cc0000;box-shadow:0 0 10px rgba(220,30,30,0.6);
}
.rep-btn::after{
  content:'🚛 NEW ACCOUNT';
  position:absolute;right:1rem;top:50%;transform:translateY(-50%);
  font-size:0.7rem;letter-spacing:0.2em;
  color:rgba(255,255,255,0.2);
  font-family:'Rajdhani',sans-serif;
}
.rep-btn:hover{
  background:rgba(180,0,0,0.15);
  border-color:rgba(220,30,30,0.7);
  transform:translateX(4px);
  box-shadow:0 0 20px rgba(180,0,0,0.2);
}
.rep-btn:active{transform:scale(0.98);}
.instructions{
  margin-top:2rem;
  text-align:center;
  color:rgba(255,255,255,0.2);
  font-size:0.85rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  line-height:1.8;
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">Johanson Transportation Service</div>
  <div class="title">🏆 New Account!</div>
  <div class="subtitle">Tap your name to celebrate</div>
  <div class="divider"></div>
</div>

<div class="btn-grid">
  <a class="rep-btn" href="https://dganske5-design.github.io/johanson-celebration/johanson-celebration.html?rep=COLTON+HAFEY" target="_blank">Colton Hafey</a>
  <a class="rep-btn" href="https://dganske5-design.github.io/johanson-celebration/johanson-celebration.html?rep=CHAD+PROCTOR" target="_blank">Chad Proctor</a>
  <a class="rep-btn" href="https://dganske5-design.github.io/johanson-celebration/johanson-celebration.html?rep=GRAYSON+GRIMES" target="_blank">Grayson Grimes</a>
  <a class="rep-btn" href="https://dganske5-design.github.io/johanson-celebration/johanson-celebration.html?rep=MARCIE+ANDRADE" target="_blank">Marcie Andrade</a>
  <a class="rep-btn" href="https://dganske5-design.github.io/johanson-celebration/johanson-celebration.html?rep=DREW+GANSKE" target="_blank">Drew Ganske</a>
</div>

<div class="instructions">
  Tap your name → both TVs fire instantly 🎉<br>
  Bookmark this page on your phone
</div>
</body>
</html>
